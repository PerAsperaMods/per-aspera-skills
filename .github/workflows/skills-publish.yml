name: Skills — Validate & Publish

on:
  push:
    branches: [main]
    paths:
      - '.github/skills/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/skills/**'

jobs:
  validate:
    name: Validate skills
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type gh > /dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y gh)

      - name: Validate skills (dry-run)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh skill publish --dry-run

  publish:
    name: Publish skills
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type gh > /dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y gh)

      - name: Auto-fix metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh skill publish --fix

      - name: Publish skills
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh skill publish
